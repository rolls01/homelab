services:
  nginx:
    image: jc21/nginx-proxy-manager:${NPM_VERSION}
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8181:81"
    volumes:
      - ../../data/nginx:/data
      - ../../data/nginx-letsencrypt:/etc/letsencrypt
    security_opt:
      - no-new-privileges:true
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:81 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  homelab:
    external: true
