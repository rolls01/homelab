services:
  crowdsec:
    image: crowdsecurity/crowdsec:${CROWDSEC_VERSION}
    container_name: crowdsec
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    environment:
      - COLLECTIONS=crowdsecurity/nginx
      - TZ=Europe/Warsaw

    volumes:
      - ../../data/crowdsec/data:/var/lib/crowdsec/data
      - ../../data/crowdsec/config:/etc/crowdsec
      - ../../data/nginx/logs:/var/log/nginx-proxy-manager:ro
    tmpfs:
      - /tmp
      - /run

    networks:
      - homelab

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

    healthcheck:
      test: ["CMD-SHELL", "cscli metrics >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 60s

networks:
  homelab:
    external: true
